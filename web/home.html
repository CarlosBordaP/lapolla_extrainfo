<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polla — Inicio</title>
  <link rel="stylesheet" href="/web/app.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <main id="main"><div class="empty">Cargando…</div></main>

<script src="/web/teams.js"></script>
<script>
const fmtDate = iso => new Date(iso).toLocaleString("es-CO", { timeZone:"America/Bogota", dateStyle:"medium", timeStyle:"short" }) + " (Bogotá)";
const fmtShortDate = iso => new Date(iso).toLocaleString("es-CO", { timeZone:"America/Bogota", dateStyle:"short", timeStyle:"short" });
const fmtTime = iso => new Date(iso).toLocaleTimeString("es-CO", { timeZone:"America/Bogota" });
const short = t => t.slice(0, 3).toUpperCase();

function spotlightCard(s) {
  if (!s) return `<div class="card"><div class="card-head"><span class="k-label">Próximo partido</span></div>
    <div class="s">No hay partidos programados todavía.</div></div>`;
  const live = s.kind === "live";
  const score = (s.home_score ?? "–") + " : " + (s.away_score ?? "–");
  const metaRight = live
    ? (s.score_updated_at ? "Leído " + fmtTime(s.score_updated_at) : "")
    : fmtShortDate(s.kickoff_utc);
  return `<div class="card ${live ? "gold" : ""} clickable" data-go="/match?id=${s.id}" title="Ver partido">
    <div class="card-head">
      <span class="k-label">${live ? '<span class="dot"></span>En vivo ahora' : "Próximo partido"}</span>
      <span class="k-meta">${metaRight}</span>
    </div>
    <div class="match-row">
      <div class="team-col">${flag(s.home_team)}<span class="team">${s.home_team}</span></div>
      <span class="v" style="font-size:1.4rem">${live ? score : "vs"}</span>
      <div class="team-col">${flag(s.away_team)}<span class="team">${s.away_team}</span></div>
    </div>
  </div>`;
}

function lastMatchCard(lm) {
  if (!lm) return `<div class="card"><div class="card-head"><span class="k-label">Último partido</span></div>
    <div class="s">Aún no se ha jugado ningún partido.</div></div>`;
  const score = lm.home_score + " : " + lm.away_score;
  const hasPred = lm.pred_home != null;
  const predTxt = hasPred ? `Predicción: ${lm.pred_home}-${lm.pred_away}` : "Sin pronóstico";
  return `<div class="card clickable" data-go="/match?id=${lm.id}" title="Ver partido">
    <div class="card-head">
      <span class="k-label">Último partido</span>
      <span class="tag-success">✓ Finalizado</span>
    </div>
    <div class="match-row">
      <div class="team-col">${flag(lm.home_team)}<span class="team">${short(lm.home_team)}</span></div>
      <span class="v" style="font-size:1.4rem">${score}</span>
      <div class="team-col">${flag(lm.away_team)}<span class="team">${short(lm.away_team)}</span></div>
    </div>
    <div class="pred-box">
      <span class="muted-label">${predTxt}</span>
      ${hasPred && lm.match_points != null ? `<span class="pts">+ ${lm.match_points} pts</span>` : ""}
    </div>
  </div>`;
}

function positionCard(me) {
  if (me.rank == null) {
    return `<div class="card"><div class="k">Tu posición</div>
      <div class="v">—</div><div class="s">Aún no tienes puntos. Aparecerás cuando se juegue un partido con tu predicción.</div></div>`;
  }
  const leaderMsg = me.rank === 1
    ? "🏆 ¡Vas liderando la tabla!"
    : me.points_behind_leader != null
      ? `Estas a <b style="color:var(--text)">${me.points_behind_leader}</b> pts del líder`
      : "";
  return `<div class="card gold clickable" data-go="/board" title="Ver tabla completa">
    <div class="k">Tu posición <span class="chev">›</span></div>
    <div class="v">#${me.rank}<span style="font-size:1rem" class="muted"> / ${me.players}</span></div>
    <div class="s">${me.points} puntos</div>
    ${leaderMsg ? `<div class="s" style="margin-top:.3rem">${leaderMsg}</div>` : ""}
  </div>`;
}

(async () => {
  const me = await fetch("/me").then(r => r.json());
  const main = document.getElementById("main");

  if (!me.identified) {
    main.innerHTML = `<h1>Bienvenido a la Polla ⚽</h1>
      <div class="cards">
        <div class="card gold">
          <div class="k">Antes de empezar</div>
          <div class="v" style="font-size:1.2rem">¿Quién eres?</div>
          <div class="s">Identifícate para ver tu posición y tus KPIs.</div>
          <button class="btn" style="margin-top:.7rem" id="idBtn">Identifícate</button>
        </div>
        ${spotlightCard(me.spotlight)}
      </div>`;
    document.getElementById("idBtn").onclick = () => window.openIdentify();
    main.querySelectorAll(".clickable[data-go]").forEach(el =>
      el.addEventListener("click", () => { location.href = el.dataset.go; }));
    return;
  }

  main.innerHTML = `<h1>Hola, ${me.display_name} 👋</h1>
    <div class="cards">${positionCard(me)}${lastMatchCard(me.last_match)}${spotlightCard(me.spotlight)}</div>
    <h2>Tu evolución</h2>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:.5rem; flex-wrap:wrap">
        <div class="k">Variación a lo largo de los partidos</div>
        <div class="seg">
          <button data-mode="rank">Puesto</button>
          <button data-mode="points">Puntos</button>
          <button data-mode="leader">Líder</button>
        </div>
      </div>
      <div id="evo" style="margin-top:.6rem"><div class="empty">Cargando…</div></div>
    </div>
    <h2>Accesos</h2>
    <div class="cards">
      <div class="card clickable" data-go="/calendar" title="Abrir calendario"><div class="k">Calendario <span class="chev">›</span></div><div class="s">Partidos, resultados y subir predicción.</div></div>
      <div class="card clickable" data-go="/board" title="Abrir tabla en vivo"><div class="k">Tabla en vivo <span class="chev">›</span></div><div class="s">Posiciones en tiempo real.</div></div>
    </div>`;

  main.querySelectorAll(".clickable[data-go]").forEach(el =>
    el.addEventListener("click", () => { location.href = el.dataset.go; }));

  // Evolution chart — toggle between cumulative points and position over time.
  const hist = await fetch("/me/history").then(r => r.json());
  const pts = hist.points || [];
  const lbl = p => `${short(p.home_team)}-${short(p.away_team)}`;

  const pointsSeries = pts.map(p => ({
    label: lbl(p), value: p.cumulative,
    tooltip: `${p.home_team} ${p.score} ${p.away_team} · ${p.played ? "+" + p.match_points : "sin pronóstico"} (total ${p.cumulative})`,
  }));
  // The leader overlay always tracks the SAME fixed identity (today's #1)
  // through every checkpoint, in both points and rank, so the two chart modes
  // tell one consistent story instead of mixing in a synthetic "best so far".
  const leaderPointsSeries = pts.filter(p => p.leader_cumulative != null).map(p => ({
    label: lbl(p), value: p.leader_cumulative,
    tooltip: `${p.home_team} ${p.score} ${p.away_team} · líder con ${p.leader_cumulative} pts`,
  }));
  const rankPts = pts.filter(p => p.rank != null);
  const playersMax = Math.max(1, ...rankPts.map(p => p.players));
  const rankSeries = rankPts.map(p => ({
    label: lbl(p), value: p.rank,
    tooltip: `${p.home_team} ${p.score} ${p.away_team} · puesto #${p.rank} de ${p.players}`,
  }));
  const intTicks = (min, max) => {
    if (max <= min) return [min];
    const step = Math.max(1, Math.ceil((max - min) / 5));
    const a = []; for (let v = min; v <= max; v += step) a.push(v);
    if (a[a.length - 1] !== max) a.push(max);
    return a;
  };
  const rankTicks = intTicks(1, playersMax);
  const leaderRankSeries = pts.filter(p => p.leader_rank != null).map(p => ({
    label: lbl(p), value: p.leader_rank,
    tooltip: `${p.home_team} ${p.score} ${p.away_team} · líder en el puesto #${p.leader_rank}`,
  }));

  const evo = document.getElementById("evo");
  function render(mode) {
    document.querySelectorAll(".seg button").forEach(b =>
      b.classList.toggle("active", b.dataset.mode === mode));
    if (mode === "rank") {
      lineChart(evo, rankSeries, {
        invert: true, domainMin: 1, domainMax: playersMax, ticks: rankTicks,
        pointLabels: true, format: v => "#" + v,
        emptyText: "Tu puesto aparecerá cuando se jueguen partidos.",
      });
    } else if (mode === "leader") {
      const tuRank = { name: "Tú", points: rankSeries, color: "#f59e0b", dot: "#10b981", primary: true };
      const series = leaderRankSeries.length
        ? [tuRank, { name: "Líder", points: leaderRankSeries, color: "#4edea3", dashed: true }]
        : [tuRank];
      lineChart(evo, series, {
        invert: true, domainMin: 1, domainMax: playersMax, ticks: rankTicks,
        pointLabels: true, format: v => "#" + v,
        emptyText: "Tu puesto aparecerá cuando se jueguen partidos.",
      });
    } else {
      const tuSeries = { name: "Tú", points: pointsSeries, color: "#f59e0b", dot: "#10b981", primary: true };
      const series = leaderPointsSeries.length
        ? [tuSeries, { name: "Líder", points: leaderPointsSeries, color: "#4edea3", dashed: true }]
        : [tuSeries];
      lineChart(evo, series, {
        pointLabels: true,
        emptyText: "Tu evolución aparecerá cuando se jueguen partidos.",
      });
    }
  }
  document.querySelectorAll(".seg button").forEach(b => b.onclick = () => render(b.dataset.mode));
  render("rank");
})();
</script>
<script src="/web/chart.js"></script>
<script src="/web/nav.js"></script>
<script src="/web/track.js"></script>
</body>
</html>
